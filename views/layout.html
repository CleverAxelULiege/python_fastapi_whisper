<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monk</title>
    <link href="{{ url_for('public', path='/styles/style.css') }}" rel="stylesheet">
    {% block styles %}{% endblock %}
</head>

<body>
    <header>
        <div>
            <a class="logo" href="/">
                <h1>MONK</h1>
            </a>
            <nav class="desktop">
                <ul>
                    {% if request.state.user %}
                    <li><a href="/logout">&#10097; Se déconnecter <span>Connecté(e) : <i>{{request.state.user.username}}</i></span></a></li>
                    <li><a href="#">&#10097; Transcriptions</a></li>
                    {% else %}
                    <li><a href="/login">&#10097; Se connecter</a></li>
                    {% endif %}
                </ul>
            </nav>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>

</html>
