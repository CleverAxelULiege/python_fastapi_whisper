<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper</title>
    <link href="{{ url_for('public', path='/styles/style.css') }}" rel="stylesheet">
    {% block styles %}{% endblock %}
</head>

<body>
    <header>
        <div class="logo_nav">
            <a href="/" class="logo">
                <h1>Whisper<span class="blinking_cursor">|</span></h1>
            </a>
            {% if request.state.user %}
                <p>{{ request.state.user.username }}</p>
            {% endif %}
            <nav class="desktop">
                <ul>
                    <li>
                        <a href="{{ url_for('read_login_page') }}">&#9732; se connecter</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div>
            {% block content %}{% endblock %}
        </div>
    </main>
</body>

</html>
